version: "3.7"

services:
  ycast:
    image: netraams/ycast-docker:latest
    container_name: ycast
    restart: unless-stopped
    network_mode: host
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${APP_DATA_DIR}/data/stations:/stations
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    ports:
      - "8080:8080"   # Falls du nicht network_mode: host willst
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

manifestVersion: 1
id: dev-unode-smart-tv-telegram
name: Smart TV Telegram
version: "1.4.0"
repo: https://github.com/andrew-ld/smart-tv-telegram
support: https://github.com/andrew-ld/smart-tv-telegram/issues
category: media
tagline: Telegram Videos direkt auf Smart TV streamen
icon: https://raw.githubusercontent.com/andrew-ld/smart-tv-telegram/master/smart_tv_telegram/static/icon.png
screenshots:
  - https://raw.githubusercontent.com/andrew-ld/smart-tv-telegram/master/screenshot.jpg

description: >-
  Mit diesem Bot kannst du Videos und Filme aus Telegram direkt auf dein Smart TV, Chromecast, Kodi oder VLC streamen – ohne Download.

website: https://github.com/andrew-ld/smart-tv-telegram
port: 8350
torOnly: false
dependencies: []

umbrel:
  version: "1.0"
  app:
    config:
      - name: config.ini
        path: /app/config.ini
        template: |
          [mtproto]
          api_id=REPLACE_WITH_YOUR_API_ID
          api_hash=REPLACE_WITH_YOUR_API_HASH
          token=REPLACE_WITH_YOUR_BOT_TOKEN
          session_name=smart_tv_telegram

          [bot]
          admins=[REPLACE_WITH_YOUR_TELEGRAM_USER_ID]

          [http]
          listen_host=0.0.0.0
          listen_port=8350

          [web_ui]
          enabled=1
          password=umbrel123

          [discovery]
          upnp_enabled=1
          chromecast_enabled=1

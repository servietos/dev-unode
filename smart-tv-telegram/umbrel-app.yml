manifestVersion: 1
id: dev-unode-smart-tv-telegram
name: Smart TV Telegram
version: "1.4.0"
repo: https://github.com/andrew-ld/smart-tv-telegram
support: https://github.com/andrew-ld/smart-tv-telegram/issues
category: media
tagline: Stream Filme von Telegram direkt auf dein Smart TV
icon: https://raw.githubusercontent.com/andrew-ld/smart-tv-telegram/master/smart_tv_telegram/static/icon.png
screenshots:
  - https://raw.githubusercontent.com/andrew-ld/smart-tv-telegram/master/screenshot.jpg
description: >-
  Ein Telegram-Bot, mit dem du Videos und Filme direkt von Telegram auf dein Smart TV (UPnP), Chromecast, Kodi oder VLC streamen kannst – ohne alles vorher herunterzuladen.
website: https://github.com/andrew-ld/smart-tv-telegram
port: 8350
torOnly: false
dependencies: []

# Umbrel-spezifische Konfiguration
umbrel:
  app:
    # Hier wird die Konfig-Datei gemanaged
    config:
      - name: config.ini
        path: /app/config.ini
        template: |
          [mtproto]
          api_id=DEIN_API_ID
          api_hash=DEIN_API_HASH
          token=DEIN_BOT_TOKEN
          session_name=smart_tv_telegram

          [bot]
          admins=[DEINE_TELEGRAM_USER_ID]

          [http]
          listen_host=0.0.0.0
          listen_port=8350

          [web_ui]
          enabled=1
          password=deinpasswort

          [discovery]
          upnp_enabled=1
          # Weitere Einstellungen nach Bedarf...
